<!doctype html>
<html lang="uz">
    <head>
        <meta charset="UTF-8" />
        <title>Sertifikat</title>

        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background: #f5f5f5;
            }

            .certificate {
                width: 1200px;
                height: 800px;
                margin: 40px auto;
                position: relative;
                background-size: cover;
                background-position: center;
                /*border: 10px solid #2f5c8f;*/
                box-sizing: border-box;
            }

            .inner {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
            
            /* LOGO + TITLE */
            .top {
                position: absolute;
                top: 60px;
                width: 100%;
                text-align: center;
            }
            
            .logo {
                height: 70px;
                margin-bottom: 10px;
            }
            
            .title {
                font-size: 64px;
                font-weight: bold;
                color: #3b6ea5;
            }
            
            /* NAME */
            .name {
                position: absolute;
                top: 250px;
                width: 100%;
                text-align: center;
                font-size: 40px;
                font-weight: bold;
            }
            
            /* LINE */
            .divider {
                position: absolute;
                top: 320px;
                left: 20%;
                width: 60%;
                border-bottom: 2px solid #3b6ea5;
            }
            
            /* SECTION */
            .section {
                position: absolute;
                top: 350px;
                width: 100%;
                text-align: center;
                font-size: 18px;
            }
            
            /* FILE NAME */
            .file-name {
                position: absolute;
                top: 390px;
                width: 100%;
                text-align: center;
                font-size: 20px;
            }
            
            /* LEFT BLOCK */
            .left {
                position: absolute;
                bottom: 140px;
                left: 120px;
                font-size: 18px;
            }
            
            /* RIGHT BLOCK */
            .right {
                position: absolute;
                bottom: 120px;
                right: 120px;
                text-align: right;
                font-size: 18px;
            }
            
            /* QR */
            .qr {
                width: 120px;
                margin-top: 10px;
            }
            
            /* FOOTER */
            .footer {
                position: absolute;
                bottom: 40px;
                width: 100%;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <!--<div
            class="certificate"
            style="background-image: url('{{ background_image }}');"
        >-->
        <div
            class="certificate"
            style="background-image: url('./5754469 (1).png')"
        >
            <div class="inner">
                <div class="top">
                    <!--<img src="{{ logo_url }}" class="logo" alt="Logo" />-->
                    <img src="./anti plagiat logo.png" class="logo" alt="Logo" />

                    <div class="title">SERTIFIKAT</div>
                </div>

                <!--<div class="name">{{ full_name }}</div>-->
                <div class="name">Azizbek Usmonov</div>
                <div class="divider"></div>

                <div class="section">Tekshirilgan fayl nomi:</div>

                <!--<div class="file-name">{{ file_name }}</div>-->
                <div class="file-name">Usmovon Azizbek Resume</div>

                <div class="bottom">
                    <div class="left">
                        <p>
                            O‘xshashlik:
                            <!--<span class="percent">{{ similarity }}%</span>-->
                            <span class="percent">100%</span>
                        </p>
                        <p>
                            Originallik:
                            <!--<span class="percent">{{ originality }}%</span>-->
                            <span class="percent">100%</span>
                        </p>
                    </div>

                    <div class="right">
                        <p>
                            <!--<strong>Sertifikat raqami:</strong><br />{{ certificate_id }}-->
                            <strong>Sertifikat raqami:</strong> 777
                        </p>
                        <p>
                            <!--<strong>Berilgan vaqti:</strong><br />{{ given_time|date:"d.m.Y H:i" }}-->
                            <strong>Berilgan vaqti:</strong> 2023-09-25 12:00
                        </p>
                        <img src="{{ qr_code }}" class="qr" alt="QR" />
                    </div>
                </div>

                <div class="footer">anti-plagiat.uz</div>
            </div>
        </div>
    </body>
</html>
